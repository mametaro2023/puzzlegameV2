<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ブロック積みゲーム（モジュール版）</title>
  <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>パズルゲーム</title>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- ▼▼▼ この行を追加 ▼▼▼ -->
    <link rel="icon" href="data:,">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div id="game-container">
    <canvas id="game" width="1600" height="1000"></canvas>
</div>

<div id="lobby-overlay">
    <!-- タイトルとロビーの選択画面 -->
    <div id="title-screen">
        <h1>パズルゲーム</h1>
        <button id="create-room-button">部屋を作る</button>
        <button id="enter-room-button">部屋に入る</button>
    </div>

    <!-- 部屋を作る（部屋名入力） -->
    <div id="room-screen" class="hidden">
        <h2>部屋の名前を入力</h2>
        <input type="text" id="room-input" placeholder="例: room123" maxlength="15">
        <button id="create-button">作成</button>
    </div>

    <!-- 部屋一覧から入室 -->
    <div id="room-list-screen" class="hidden">
        <h2>部屋を選択</h2>
        <div id="room-list"></div>
        <button id="refresh-rooms">更新</button>
    </div>
</div>

<div id="controls-overlay">
    <div class="controls-container">
        <div id="btn-left" class="control-btn">◀</div>
        <div id="btn-right" class="control-btn">▶</div>
        <div id="btn-rotate-up" class="control-btn">↶</div>
        <div id="btn-rotate-down" class="control-btn">↷</div>
        <div id="btn-hard-drop" class="control-btn">DROP</div>
        <div id="btn-use-self" class="control-btn">X</div>
        <div id="btn-use-opponent" class="control-btn">C</div>
    </div>
</div>

<div id="status-overlay" style="position: absolute; top: 10px; left: 10px; color: white; font-size: 24px; font-family: sans-serif; display: none;">
    <p id="status-text">マッチング相手を探しています...</p>
</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
