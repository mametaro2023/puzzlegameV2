<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Stylish Block Puzzle</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="ui-root">
    <canvas id="game" width="1600" height="1000"></canvas>
    <!-- 中央コンボ表示 -->
    <div id="combo-display" class="hidden"></div>
    <!-- 簡易デバッグ / 情報 -->
    <div id="hud">
      <div id="gauge-label">SPEED</div>
      <div id="inventory-label">ITEMS</div>
    </div>
  </div>

  <!-- スクリプト群 -->
  <script type="module" src="js/anim.js"></script>
  <script type="module" src="js/effects.js"></script>
  <script type="module" src="js/render.js"></script>
  <script type="module" src="js/game.js"></script>
</body>
</html>
